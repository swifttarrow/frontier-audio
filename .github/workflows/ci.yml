name: CI

on:
  push:
    branches: [main]
    paths:
      - 'services/voice-gateway/**'
      - 'apps/android/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/voice-gateway/**'
      - 'apps/android/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  backend-test:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            services/voice-gateway/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('services/voice-gateway/**/*.gradle.kts') }}

      - name: Generate Gradle wrapper
        working-directory: services/voice-gateway
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Run tests
        working-directory: services/voice-gateway
        run: ./gradlew test

      - name: Run lint
        working-directory: services/voice-gateway
        run: ./gradlew check || true

  android-test:
    name: Android — Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/android/.gradle
          key: android-gradle-${{ runner.os }}-${{ hashFiles('apps/android/**/*.gradle.kts') }}

      - name: Create local.properties
        working-directory: apps/android
        run: echo "voiceGatewayWsUrl=ws://localhost:8080/v1/voice" > local.properties

      - name: Run unit tests
        working-directory: apps/android
        run: ./gradlew test || true

      - name: Run lint
        working-directory: apps/android
        run: ./gradlew lint || true

  docker-compose-check:
    name: Docker Compose — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
