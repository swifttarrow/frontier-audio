services:
  postgres:
    image: postgres:16-alpine
    # Host 5433 avoids clashing with a local Postgres on the default 5432 (e.g. Homebrew).
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: jarvis_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
